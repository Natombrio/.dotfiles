# See https://wiki.hyprland.org/Configuring/Monitors/
$main_monitor = DP-5
$sub_monitor = HDMI-A-5
monitor=$main_monitor,3840x2160@240,0x0,1, vrr, 3
monitor=$sub_monitor,1920x1080@60,3840x800,1
#monitor=,preferred,auto,1
# monitor=$sub_monitor,disable
# monitor=$main_monitor,disable
workspace=1,monitor:$main_monitor,default:true,persistent:true
workspace=2,monitor:$main_monitor,default:true,persistent:false
workspace=3,monitor:$main_monitor,default:true,persistent:false
workspace=4,monitor:$main_monitor,default:true,persistent:false
workspace=5,monitor:$main_monitor,default:true,persistent:false
workspace=99,monitor:$sub_monitor,default:true,persistent:true

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
exec-once = dunst
exec-once = xrandr --output $main_monitor --primary
exec-once = fcitx5
exec-once = protonmail-bridge -n

# portals
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Focus main workspace
exec-once = hyprctl dispatch workspace 1
exec-once = hyprctl dispatch focusmonitor 1

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Some default env vars.
env = LIBVA_DRIVER_NAME,nvidia
env = MOZ_ENABLE_WAYLAND,1
env = NVD_BACKEND,direct
env = XCURSOR_SIZE,30
env = HYPRCURSOR_SIZE,30
env = XDG_SESSION_TYPE,wayland
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = fi
    kb_variant =
    kb_model =
    kb_rules =
    kb_options = fkeys:basic_13-24

    numlock_by_default = true

    follow_mouse = 2
    force_no_accel = true

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    scroll_method = 2fg
    scroll_button = 274

    touchpad {
      natural_scroll = true
      scroll_factor = 0.3
      clickfinger_behavior = true
    }
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 0
    gaps_out = 0
    border_size = 1
    col.active_border = rgba(000fffff) 45deg
    col.inactive_border = rgba(000000ff)
    resize_on_border = true
    layout = dwindle
    allow_tearing = true

}

cursor {
    default_monitor = $main_monitor
    no_warps = true
    no_hardware_cursors = true
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    rounding = 3
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 3, myBezier
    animation = windowsOut, 1, 2, default, popin 50%
    animation = windowsMove, 1, 0.1, default
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 0.3, default
    animation = workspaces, 0
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_status = master
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe_invert = off
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
# device:apple-inc.-magic-trackpad {
# }

misc {
    disable_hyprland_logo = true
    mouse_move_focuses_monitor = false
    enable_swallow = false
    swallow_regex = ^(ghostty)$
}

# # REAPER workaround, https://github.com/hyprwm/Hyprland/discussions/6896
# windowrule = float, class:REAPER
# windowrule = move cursor 5px 15px, class:REAPER
# windowrule = minsize 1 1, class:REAPER
# windowrule = stayfocused, class:REAPER

# Lutris
windowrule=monitor 1, match:class ^(lutris)$

# Games
windowrule=monitor 1, match:class ^(explorer.exe)$
windowrule=monitor 1, match:class ^(steam)$
windowrule=monitor 1, match:class ^(steam_app_252950)$
windowrule=monitor 1, match:class ^(tsmapplication.exe)$
windowrule=monitor 1, match:class ^(battle.net.exe)$
windowrule=monitor 1, match:class ^(wow.exe)$
windowrule=monitor 1, match:class ^(leagueclient.exe)$
windowrule=monitor 1, match:class ^(leagueclientux.exe)$
windowrule=monitor 1, match:class ^(league of legends.exe)$
windowrule=monitor 1, match:class ^(riotclientux.exe)$
windowrule=monitor 1, match:class ^(blizzarderror.exe)$
windowrule=monitor 1, match:class ^(starrail.exe)$
windowrule=monitor 1, match:title ^(Genshin Impact)$

# Pinta
windowrule=monitor 0, match:class ^(pinta)$

# Wofi
layerrule = no_anim on, match:namespace rofi

# mpv
windowrule=monitor 1, match:class ^(mpv)$

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# OBS
bindl = SUPER, F15, sendshortcut, SUPER, F1, class:^(com\.obsproject\.Studio)$
bindl = SUPER, F16, sendshortcut, SUPER, F2, class:^(com\.obsproject\.Studio)$

# wl-paste
exec-once = wl-paste --watch cliphist store
bind = $mainMod, Z, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Audio and screenshots
## clipboard
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy -t image/png
## save
bind = CTRL, Print, exec, grim -g "$(slurp)" | wl-copy -t image/png
## Main monitor to clipboard
bind = SHIFT, Print, exec, grim -o $main_monitor - | wl-copy -t image/png

bind = ,XF86AudioPlay, exec, playerctl play-pause
bind = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2.5%-
bind = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 2.5%+
bind = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# L mod
bind = $mainMod, L, workspace, 99
bind = $mainMod SHIFT, L, movetoworkspace, 99
# U mod
workspace=999,monitor:$sub_monitor
windowrule=workspace 999, match:class ^(vesktop)$
bind = ALT, U, workspace, 999
bind = ALT, U, exec, vesktop --single-instance --ozone-platform-hint=auto --enable-blink-features=MiddleClickAutoscroll
bind = $mainMod, U, workspace, 999
bind = $mainMod SHIFT, U, movetoworkspace, 999
# F1 mod
workspace=998,monitor:$main_monitor
bind = $mainMod, F1, workspace, 998
bind = $mainMod SHIFT, F1, movetoworkspace, 998
# F10-monitoring mod
workspace=997,monitor:$sub_monitor
bind = $mainMod, F10, workspace, 997
bind = $mainMod SHIFT, F10, movetoworkspace, 997

#My binds
bind = ALT, L, exec, ghostty
bind = ALT, E, exec, thunar
bind = SUPER, N, exec, rofi -show drun
bind = SUPER, E, exec, rofi -show window

# Desktop apps are located in:
# /usr/share/applications/
bind = $mainMod ALT, left, movewindow, mon:1
bind = $mainMod ALT, right, movewindow, mon:0
bind = ALT, TAB, focuscurrentorlast, last
bind = $mainMod SHIFT, n, swapwindow, l
bind = $mainMod SHIFT, o, swapwindow, r

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = ALT, Escape, killactive,
bind = $mainMod, F, togglefloating,
bind = $mainMod, F, centerwindow,
bind = $mainMod, P, fullscreen
bind = $mainMod, J, togglesplit, # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
